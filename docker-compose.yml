services:
  backend:
    build: ./backend
    container_name: didiread-backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - USERNAME=${USERNAME}
      - PASSWORD=${PASSWORD}
      - PORT=3000
      - CORS_ORIGIN=http://localhost
    volumes:
      - ./data:/app/data
    networks:
      - didiread-network

  frontend:
    build: ./frontend
    container_name: didiread-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - didiread-network

networks:
  didiread-network:
    driver: bridge